<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌟 ぶんすう マスター 🌟</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Zen Maru Gothic"', 'sans-serif'] },
                    animation: {
                        'pop-in': 'pop-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'shake': 'shake 0.6s ease-in-out',
                    },
                    keyframes: {
                        'pop-in': {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '80%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        'shake': {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-10px)' },
                            '20%, 40%, 60%, 80%': { transform: 'translateX(10px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] { -moz-appearance: textfield; }
        button { touch-action: manipulation; }
    </style>
</head>
<body class="bg-yellow-50 text-gray-800 min-h-screen p-4 flex flex-col items-center justify-center font-sans selection:bg-pink-300">

    <div class="w-full max-w-4xl bg-white rounded-[2.5rem] shadow-2xl p-6 md:p-10 border-8 border-orange-200">
        
        <h1 class="text-3xl md:text-5xl font-black text-center text-orange-500 mb-6 drop-shadow-sm">
            🌟 ぶんすう マスター 🌟
        </h1>

        <!-- 難易度切り替えボタン -->
        <div class="flex justify-center gap-2 md:gap-4 mb-6">
            <button class="level-btn bg-red-400 text-white shadow-inner font-bold py-2 px-4 md:px-6 rounded-full text-sm md:text-lg transition transform" data-level="1">
                ⭐ レベル1
            </button>
            <button class="level-btn bg-gray-200 text-gray-500 hover:bg-gray-300 font-bold py-2 px-4 md:px-6 rounded-full text-sm md:text-lg transition transform" data-level="2">
                ⭐⭐ レベル2
            </button>
            <button class="level-btn bg-gray-200 text-gray-500 hover:bg-gray-300 font-bold py-2 px-4 md:px-6 rounded-full text-sm md:text-lg transition transform" data-level="3">
                ⭐⭐⭐ レベル3
            </button>
        </div>

        <!-- モード切り替えボタン -->
        <div class="flex flex-wrap justify-center gap-2 md:gap-3 mb-8">
            <button id="btn-simplify" class="mode-btn bg-yellow-400 hover:bg-yellow-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                ✨ やくぶん
            </button>
            <button id="btn-mix2imp" class="mode-btn bg-green-400 hover:bg-green-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                ➡️ かぶんすう
            </button>
            <button id="btn-imp2mix" class="mode-btn bg-pink-400 hover:bg-pink-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                ⬅️ たいぶんすう
            </button>
            <button id="btn-frac2dec" class="mode-btn bg-purple-400 hover:bg-purple-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                🔢 分数 ➡️ 小数
            </button>
            <button id="btn-dec2frac" class="mode-btn bg-teal-400 hover:bg-teal-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                🔢 小数 ➡️ 分数
            </button>
            <button id="btn-mix" class="mode-btn bg-indigo-400 hover:bg-indigo-500 text-white font-bold py-2 px-4 rounded-xl text-base md:text-xl shadow-md transition transform">
                🔀 ミックス
            </button>
        </div>

        <!-- 問題表示エリア -->
        <div class="bg-blue-50 rounded-[2rem] p-6 md:p-10 mb-8 border-4 border-blue-200 relative overflow-hidden min-h-[250px] flex flex-col justify-center">
            <div class="absolute top-[-20px] left-[-20px] text-6xl opacity-20">☁️</div>
            <div class="absolute bottom-[-20px] right-[-20px] text-6xl opacity-20">🎈</div>

            <h2 id="instruction-text" class="text-2xl md:text-3xl font-black text-center text-blue-800 mb-8 relative z-10">
                もんだい
            </h2>
            
            <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 relative z-10">
                <div id="question-container" class="flex items-center justify-center"></div>
                <div class="text-5xl md:text-7xl font-bold text-gray-400">＝</div>
                <div id="answer-container" class="flex items-center justify-center"></div>
            </div>
        </div>

        <div id="feedback" class="h-24 flex items-center justify-center mb-6 text-center"></div>

        <div class="flex flex-col sm:flex-row justify-center gap-4 mb-8">
            <button id="btn-check" class="bg-red-500 hover:bg-red-600 text-white font-black py-4 px-8 rounded-full text-2xl md:text-3xl shadow-xl transition transform hover:scale-105 active:scale-95">
                ✅ こたえあわせ
            </button>
            <button id="btn-next" class="bg-blue-500 hover:bg-blue-600 text-white font-black py-4 px-8 rounded-full text-2xl md:text-3xl shadow-xl transition transform hover:scale-105 active:scale-95">
                ⏭️ つぎへ
            </button>
        </div>

        <!-- せいせきエリア -->
        <div class="bg-gray-50 rounded-[2rem] p-6 border-4 border-gray-200">
            <h3 class="text-xl md:text-2xl font-black text-center text-gray-700 mb-4">📊 せいせき</h3>
            <div id="stats-container" class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4 text-sm md:text-lg mb-4">
                <!-- JSで成績がここに挿入されます -->
            </div>
            
            <div>
                <button id="btn-toggle-history" class="w-full bg-white border-2 border-gray-300 rounded-full py-2 font-bold text-gray-600 hover:bg-gray-100 transition shadow-sm">
                    📝 これまでのきろく をみる
                </button>
                <div id="history-list" class="hidden mt-4 max-h-60 overflow-y-auto bg-white rounded-xl p-4 border-2 border-gray-200 shadow-inner">
                    <ul id="history-ul" class="space-y-2 text-sm md:text-base"></ul>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript ロジック -->
    <script>
        let currentMode = 'simplify';
        let actualMode = 'simplify'; 
        let currentLevel = 1;
        let currentAnswer = {}; 
        let currentProblemStr = ''; 
        let hasCountedCurrentProblem = false; 

        let stats = {
            total: { attempts: 0, corrects: 0 },
            simplify: { attempts: 0, corrects: 0 },
            mix2imp: { attempts: 0, corrects: 0 },
            imp2mix: { attempts: 0, corrects: 0 },
            frac2dec: { attempts: 0, corrects: 0 },
            dec2frac: { attempts: 0, corrects: 0 },
            mix: { attempts: 0, corrects: 0 }
        };
        let historyLog = []; 

        const elQuestion = document.getElementById('question-container');
        const elAnswer = document.getElementById('answer-container');
        const elInstruction = document.getElementById('instruction-text');
        const elFeedback = document.getElementById('feedback');
        const btnCheck = document.getElementById('btn-check');
        const btnNext = document.getElementById('btn-next');

        const btns = {
            'simplify': document.getElementById('btn-simplify'),
            'mix2imp': document.getElementById('btn-mix2imp'),
            'imp2mix': document.getElementById('btn-imp2mix'),
            'frac2dec': document.getElementById('btn-frac2dec'),
            'dec2frac': document.getElementById('btn-dec2frac'),
            'mix': document.getElementById('btn-mix')
        };
        const modeNames = { 
            'simplify': 'やくぶん', 'mix2imp': 'かぶんすうへ', 'imp2mix': 'たいぶんすうへ',
            'frac2dec': '分数→小数', 'dec2frac': '小数→分数', 'mix': 'ミックス'
        };

        const levelBtns = document.querySelectorAll('.level-btn');

        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
        function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

        function generateProblem() {
            elFeedback.innerHTML = ''; 
            hasCountedCurrentProblem = false; 
            
            actualMode = currentMode;
            if (currentMode === 'mix') {
                const modes = ['simplify', 'mix2imp', 'imp2mix', 'frac2dec', 'dec2frac'];
                actualMode = modes[getRandomInt(0, modes.length - 1)];
            }
            
            const prefix = currentMode === 'mix' ? '🔀 ' : '';

            if (actualMode === 'simplify') {
                elInstruction.innerText = prefix + '💡 やくぶん しよう！';
                let d, n;
                if (currentLevel === 1) { do { d = getRandomInt(2, 9); n = getRandomInt(1, d - 1); } while (gcd(n, d) !== 1); }
                else if (currentLevel === 2) { do { d = getRandomInt(10, 24); n = getRandomInt(2, d - 1); } while (gcd(n, d) !== 1); }
                else { do { d = getRandomInt(25, 60); n = getRandomInt(2, d - 1); } while (gcd(n, d) !== 1); }
                
                const multiplier = getRandomInt(2, currentLevel === 1 ? 5 : 4);
                const qn = n * multiplier; const qd = d * multiplier;
                
                currentAnswer = { type: 'fraction', valN: qn, valD: qd }; 
                currentProblemStr = `${qn}/${qd}`; 
                renderQuestion('fraction', null, qn, qd); 
                renderInput('fraction'); 
                
            } else if (actualMode === 'mix2imp') {
                elInstruction.innerText = prefix + '➡️ かぶんすう に なおそう！';
                let w, d, n;
                if (currentLevel === 1) { w = getRandomInt(1, 5); d = getRandomInt(2, 9); }
                else if (currentLevel === 2) { w = getRandomInt(1, 9); d = getRandomInt(10, 15); }
                else { w = getRandomInt(10, 20); d = getRandomInt(2, 20); }
                
                n = getRandomInt(1, d - 1); // ここでランダムな帯分数を生成
                
                const qn = w * d + n;
                const qd = d;
                
                currentAnswer = { type: 'fraction', valN: qn, valD: qd };
                currentProblemStr = `${w}と${n}/${d}`; 
                renderQuestion('fraction', w, n, d);
                renderInput('fraction');
                
            } else if (actualMode === 'imp2mix') {
                elInstruction.innerText = prefix + '⬅️ たいぶんすう に なおそう！';
                let w, d, n;
                if (currentLevel === 1) { w = getRandomInt(1, 5); d = getRandomInt(2, 9); }
                else if (currentLevel === 2) { w = getRandomInt(1, 9); d = getRandomInt(10, 15); }
                else { w = getRandomInt(10, 20); d = getRandomInt(2, 20); }
                n = getRandomInt(1, d - 1);
                
                // 約分が必要な仮分数も出題されるように倍率をかける
                const multiplier = getRandomInt(1, 3);
                const qn = (w * d + n) * multiplier; 
                const qd = d * multiplier;
                
                currentAnswer = { type: 'mixed', valN: qn, valD: qd };
                currentProblemStr = `${qn}/${qd}`; 
                renderQuestion('fraction', null, qn, qd);
                renderInput('mixed'); 

            } else if (actualMode === 'frac2dec') {
                elInstruction.innerText = prefix + '🔢 小数 に なおそう！';
                let d_list, d, n;
                if (currentLevel === 1) { d_list = [10, 100]; }
                else if (currentLevel === 2) { d_list = [2, 4, 5]; }
                else { d_list = [8, 20, 25, 40, 50]; }
                
                d = d_list[getRandomInt(0, d_list.length - 1)];
                do { n = getRandomInt(1, d - 1); } while(gcd(n, d) !== 1);
                
                const ansDec = n / d;
                currentAnswer = { type: 'decimal', val: ansDec };
                currentProblemStr = `${n}/${d}`;
                renderQuestion('fraction', null, n, d);
                renderInput('decimal');

            } else if (actualMode === 'dec2frac') {
                elInstruction.innerText = prefix + '🔢 分数 に なおそう！（やくぶんしてね）';
                let d_list, d, n;
                if (currentLevel === 1) { d_list = [10]; }
                else if (currentLevel === 2) { d_list = [2, 4, 5, 100]; }
                else { d_list = [8, 20, 25, 40, 50]; }
                
                d = d_list[getRandomInt(0, d_list.length - 1)];
                do { n = getRandomInt(1, d - 1); } while(gcd(n, d) !== 1);
                
                const qDec = n / d;
                currentAnswer = { type: 'fraction', valN: n, valD: d }; // 必ず既約分数が答えになる
                currentProblemStr = String(qDec);
                renderQuestion('decimal', null, qDec, null);
                renderInput('fraction');
            }
        }

        // 問題エリアの表示分岐
        function renderQuestion(type, val1, val2, val3) {
            if (type === 'fraction') {
                let html = '<div class="flex items-center justify-center text-blue-900">';
                if (val1 !== null) html += `<div class="text-7xl md:text-8xl font-black mr-3 mb-2">${val1}</div>`;
                html += `
                    <div class="flex flex-col items-center justify-center">
                        <div class="text-6xl md:text-7xl font-bold leading-none mb-2">${val2}</div>
                        <div class="w-full min-w-[3.5rem] md:min-w-[4.5rem] h-1.5 md:h-2 bg-blue-900 rounded-full"></div>
                        <div class="text-6xl md:text-7xl font-bold leading-none mt-2">${val3}</div>
                    </div></div>`;
                elQuestion.innerHTML = html;
            } else if (type === 'decimal') {
                elQuestion.innerHTML = `<div class="text-7xl md:text-8xl font-black text-blue-900 leading-none">${val2}</div>`;
            }
        }

        // 入力エリアの表示分岐
        function renderInput(type) {
            let html = '<div class="flex items-center justify-center">';
            
            if (type === 'mixed' || type === 'fraction') {
                if (type === 'mixed') {
                    html += `<input type="number" id="ans-whole" placeholder="?" class="w-16 h-20 md:w-24 md:h-28 text-4xl md:text-6xl text-center border-4 border-pink-300 rounded-2xl focus:outline-none focus:border-pink-500 mr-2 md:mr-4 font-bold text-gray-800 shadow-inner bg-white placeholder-gray-300 transition" />`;
                }
                html += `
                    <div class="flex flex-col items-center justify-center">
                        <input type="number" id="ans-num" placeholder="?" class="w-16 h-16 md:w-24 md:h-20 text-4xl md:text-5xl text-center border-4 border-green-300 rounded-2xl focus:outline-none focus:border-green-500 mb-2 font-bold text-gray-800 shadow-inner bg-white placeholder-gray-300 transition" />
                        <div class="w-full min-w-[5rem] md:min-w-[7rem] h-1.5 md:h-2 bg-gray-600 rounded-full my-1"></div>
                        <input type="number" id="ans-den" placeholder="?" class="w-16 h-16 md:w-24 md:h-20 text-4xl md:text-5xl text-center border-4 border-green-300 rounded-2xl focus:outline-none focus:border-green-500 mt-2 font-bold text-gray-800 shadow-inner bg-white placeholder-gray-300 transition" />
                    </div>`;
            } else if (type === 'decimal') {
                html += `<input type="number" step="0.001" id="ans-dec" placeholder="0.0" class="w-32 h-20 md:w-48 md:h-24 text-4xl md:text-6xl text-center border-4 border-purple-300 rounded-2xl focus:outline-none focus:border-purple-500 font-bold text-gray-800 shadow-inner bg-white placeholder-gray-300 transition" />`;
            }
            html += '</div>';
            elAnswer.innerHTML = html;
            
            setTimeout(() => {
                if(document.getElementById('ans-whole')) document.getElementById('ans-whole').focus();
                else if (document.getElementById('ans-num')) document.getElementById('ans-num').focus();
                else if (document.getElementById('ans-dec')) document.getElementById('ans-dec').focus();
            }, 100);
        }

        // 正誤判定処理
        function checkAnswer() {
            let isCorrect = false;
            let userAnswerStr = '';
            let feedbackMsg = '❌ おしい！もういちど！';

            if (currentAnswer.type === 'fraction') {
                const elNum = document.getElementById('ans-num');
                const elDen = document.getElementById('ans-den');
                if (!elNum || !elDen) return;
                if (elNum.value === '' || elDen.value === '') { showFeedback(false, '⚠️ くうらん があるよ！'); return; }
                const n = parseInt(elNum.value, 10);
                const d = parseInt(elDen.value, 10);
                userAnswerStr = `${n}/${d}`;
                
                // 値が等価であるかのチェック (分数でのクロス掛け算)
                if (n * currentAnswer.valD === d * currentAnswer.valN) {
                    if (gcd(n, d) === 1) { // 既約分数になっているかチェック
                        isCorrect = true;
                    } else {
                        feedbackMsg = '❌ おしい！まだ やくぶん できるよ！';
                    }
                }

            } else if (currentAnswer.type === 'mixed') {
                const elWhole = document.getElementById('ans-whole');
                const elNum = document.getElementById('ans-num');
                const elDen = document.getElementById('ans-den');
                if (elWhole.value === '' || elNum.value === '' || elDen.value === '') { showFeedback(false, '⚠️ くうらん があるよ！'); return; }
                const w = parseInt(elWhole.value, 10);
                const n = parseInt(elNum.value, 10);
                const d = parseInt(elDen.value, 10);
                userAnswerStr = `${w}と${n}/${d}`;
                
                // 帯分数を仮分数に変換して値を比較
                const impN = w * d + n;
                const impD = d;
                
                if (impN * currentAnswer.valD === impD * currentAnswer.valN) {
                    if (gcd(n, d) === 1 && n < d) { // 既約分数かつ真分数であるか
                        isCorrect = true;
                    } else if (n >= d) {
                        feedbackMsg = '❌ おしい！分子が分母より大きいよ！';
                    } else {
                        feedbackMsg = '❌ おしい！まだ やくぶん できるよ！';
                    }
                }

            } else if (currentAnswer.type === 'decimal') {
                const elDec = document.getElementById('ans-dec');
                if (!elDec || elDec.value === '') { showFeedback(false, '⚠️ くうらん があるよ！'); return; }
                const decVal = parseFloat(elDec.value);
                userAnswerStr = String(decVal);
                // 少数の浮動小数点の誤差を考慮して比較
                if (Math.abs(decVal - currentAnswer.val) < 0.0001) isCorrect = true;
            }

            // 成績の記録
            if (!hasCountedCurrentProblem) {
                stats.total.attempts++;
                stats[currentMode].attempts++;
                if (isCorrect) {
                    stats.total.corrects++;
                    stats[currentMode].corrects++;
                }

                const displayMode = currentMode === 'mix' ? `ミックス(${modeNames[actualMode]})` : modeNames[currentMode];

                historyLog.unshift({
                    mode: displayMode,
                    level: currentLevel,
                    problem: currentProblemStr,
                    answer: userAnswerStr,
                    isCorrect: isCorrect
                });

                hasCountedCurrentProblem = true;
                updateStatsUI(); 
            }

            if (isCorrect) showFeedback(true, '⭕️ 大せいかい！');
            else showFeedback(false, feedbackMsg);
        }

        function showFeedback(isCorrect, text) {
            if (isCorrect) elFeedback.innerHTML = `<div class="text-3xl md:text-5xl text-red-500 font-black animate-pop-in drop-shadow-md tracking-wider">${text}</div>`;
            else elFeedback.innerHTML = `<div class="text-2xl md:text-4xl text-blue-600 font-black animate-shake drop-shadow-md tracking-wider">${text}</div>`;
        }

        function updateStatsUI() {
            const container = document.getElementById('stats-container');
            const calcRate = (c, a) => a === 0 ? 0 : Math.round((c / a) * 100);
            
            container.innerHTML = `
                <div class="bg-white p-2 md:p-3 rounded-xl shadow-sm text-center border-2 border-orange-200 col-span-2 md:col-span-3">
                    <div class="text-xs md:text-sm text-gray-500 font-bold">ぜんたい の せいかい</div>
                    <div class="text-xl md:text-2xl font-black text-orange-500">${stats.total.corrects} / ${stats.total.attempts} <span class="text-base text-gray-600">(${calcRate(stats.total.corrects, stats.total.attempts)}%)</span></div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-yellow-200">
                    <div class="text-xs text-gray-500 font-bold">やくぶん</div>
                    <div class="text-lg font-bold text-yellow-500">${stats.simplify.corrects} / ${stats.simplify.attempts}</div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-green-200">
                    <div class="text-xs text-gray-500 font-bold">かぶんすう</div>
                    <div class="text-lg font-bold text-green-500">${stats.mix2imp.corrects} / ${stats.mix2imp.attempts}</div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-pink-200">
                    <div class="text-xs text-gray-500 font-bold">たいぶんすう</div>
                    <div class="text-lg font-bold text-pink-500">${stats.imp2mix.corrects} / ${stats.imp2mix.attempts}</div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-purple-200">
                    <div class="text-xs text-gray-500 font-bold">分数→小数</div>
                    <div class="text-lg font-bold text-purple-500">${stats.frac2dec.corrects} / ${stats.frac2dec.attempts}</div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-teal-200">
                    <div class="text-xs text-gray-500 font-bold">小数→分数</div>
                    <div class="text-lg font-bold text-teal-500">${stats.dec2frac.corrects} / ${stats.dec2frac.attempts}</div>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-sm text-center border-2 border-indigo-200">
                    <div class="text-xs text-gray-500 font-bold">ミックス</div>
                    <div class="text-lg font-bold text-indigo-500">${stats.mix.corrects} / ${stats.mix.attempts}</div>
                </div>
            `;

            const ul = document.getElementById('history-ul');
            ul.innerHTML = '';
            if (historyLog.length === 0) {
                ul.innerHTML = '<li class="text-center text-gray-400 py-2">まだ きろく がありません</li>';
                return;
            }

            historyLog.forEach(log => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-2 border-b border-gray-100 last:border-0';
                const icon = log.isCorrect ? '⭕️' : '❌';
                const color = log.isCorrect ? 'text-red-500' : 'text-blue-500';
                li.innerHTML = `
                    <div class="flex-1 flex items-center flex-wrap gap-2">
                        <span class="text-xs bg-gray-200 text-gray-700 rounded px-2 py-1">${log.mode} Lv${log.level}</span>
                        <span class="font-bold text-gray-700">${log.problem}</span>
                        <span class="text-gray-400">→</span>
                        <span class="font-bold text-gray-700">${log.answer}</span>
                    </div>
                    <div class="text-xl ${color} ml-4">${icon}</div>
                `;
                ul.appendChild(li);
            });
        }

        document.getElementById('btn-toggle-history').addEventListener('click', function() {
            const historyList = document.getElementById('history-list');
            historyList.classList.toggle('hidden');
            this.innerText = historyList.classList.contains('hidden') ? '📝 これまでのきろく をみる' : '📝 きろく をかくす';
        });

        // 難易度ボタンのイベント
        levelBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                levelBtns.forEach(b => {
                    b.classList.remove('bg-red-400', 'text-white', 'shadow-inner');
                    b.classList.add('bg-gray-200', 'text-gray-500');
                });
                btn.classList.remove('bg-gray-200', 'text-gray-500');
                btn.classList.add('bg-red-400', 'text-white', 'shadow-inner');
                
                currentLevel = parseInt(btn.getAttribute('data-level'), 10);
                generateProblem(); 
            });
        });

        // モード切替ボタンのイベント
        Object.keys(btns).forEach(mode => {
            btns[mode].addEventListener('click', () => {
                Object.values(btns).forEach(btn => {
                    btn.classList.remove('opacity-100', 'ring-4', 'ring-offset-2', 'ring-orange-400', 'scale-105');
                    btn.classList.add('opacity-60');
                });
                btns[mode].classList.remove('opacity-60');
                btns[mode].classList.add('opacity-100', 'ring-4', 'ring-offset-2', 'ring-orange-400', 'scale-105');
                
                currentMode = mode;
                generateProblem(); 
            });
        });

        btnCheck.addEventListener('click', checkAnswer);
        btnNext.addEventListener('click', generateProblem);
        document.addEventListener('keypress', function (e) { if (e.key === 'Enter') checkAnswer(); });

        updateStatsUI();
        btns['simplify'].click();

    </script>
</body>
</html>
